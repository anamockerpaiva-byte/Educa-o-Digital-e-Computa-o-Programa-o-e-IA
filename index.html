<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cidadania Digital: Contra a Desinformação</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Guia de Identificação de Deepfakes</h1>
        <nav>
            <button id="btn-modo">Alternar Modo Escuro</button>
        </nav>
    </header>

    <main>
        <section id="sobre">
            <h2>O que são Deepfakes?</h2>
            <p>Conteúdo gerado por IA para enganar usuários. Aprenda a identificar sinais sutis de manipulação.</p>
        </section>

        <section id="quiz">
            <h2>Teste seus conhecimentos</h2>
            <form id="form-quiz">
                <p>Você consegue identificar uma imagem manipulada?</p>
                <input type="radio" name="resposta" value="sim" id="sim">
                <label for="sim">Sim, observo iluminação e bordas.</label><br>
                
                <input type="radio" name="resposta" value="nao" id="nao">
                <label for="nao">Não, confio no que vejo de primeira.</label><br>
                
                <button type="submit">Enviar Resposta</button>
            </form>
            <div id="resultado"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Projeto de Educação Digital e IA</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
